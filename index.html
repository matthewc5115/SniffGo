<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SniffGo</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="https://i.postimg.cc/4xwV2qZZ/unblurimageai-149448597-60x5-removebg-preview.png" />
</head>
<body>
  <div class="side">
    <a href="https://matthewc5115.github.io/Images/" style="color: #a6a6a6; text-decoration: none; position: absolute; left: 5px; top: 5px;"><b>SniffGo Images</b></a>
    <a href="https://matthewc5115.github.io/Images/" style="color: #a6a6a6; text-decoration: none; position: absolute; right: 5px; top: 5px;"><b>SniffGo Nafiy</b></a>
  </div>
  <main class="center">
    <header class="brand">
      <div class="logo" aria-hidden="true">
        <img src="SniffGo-4-4-2026.png" class="small" />
      </div>
    </header>

    <form id="searchForm" class="search-form" onsubmit="return false;">
      <input id="q" class="search-input" type="search" placeholder="Search on SniffGo" aria-label="Search" />
      <div class="buttons">
        <button id="searchBtn" class="btn" type="button">Search</button>
        <button id="luckyBtn" class="btn outline" type="button">I'm Feeling Playful</button>
        <button id="vs" class="btn" type="button">Voice Search</button>
      </div>
    </form>

    <section id="resultsMeta" class="results-meta hidden" aria-live="polite">
      <div id="resultCount"></div>
      <div id="pager"></div>
    </section>

    <section id="results" class="results"></section>

    <footer class="footer">
      <small>&copy; 2026 SniffGo</small>
    </footer>
  </main>
  <script>
  const searchInput = document.getElementById('q');
  const startBtn = document.getElementById('vs');

  // Support for different browsers
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; // Set language

    startBtn.onclick = () => {
      recognition.start(); // Start listening
    };

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript; // Get text
      searchInput.value = transcript;
      console.log("Searching for:", transcript);
      // Optional: auto-trigger search function here
    };

    recognition.onerror = (event) => {
      console.error("Error occurred in recognition: " + event.error);
    };
  } else {
    alert("Your browser does not support the Web Speech API.");
  }
</script>
  <script src="scripts.js"></script>
  <script src="maintenancesystem.js"></script>
</body>
</html>
